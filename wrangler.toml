name = "homescout"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"

[triggers]
crons = ["0 15 * * *"]  # 8am PT daily

[[d1_databases]]
binding = "DB"
database_name = "homescout"
database_id = "1e55753d-0e4f-4429-b96f-7bf1b9ca697f"

[ai]
binding = "AI"

[browser]
binding = "BROWSER"

[vars]
RESEND_API_KEY = ""  # Set via wrangler secret

[assets]
directory = "./public"
binding = "ASSETS"
