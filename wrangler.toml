name = "homescout"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"

[triggers]
crons = ["0 15 * * *"]  # 8am PT daily

[[d1_databases]]
binding = "DB"
database_name = "homescout"
database_id = "local"  # Will be replaced after `wrangler d1 create`

[ai]
binding = "AI"

[browser]
binding = "BROWSER"

[vars]
RESEND_API_KEY = ""  # Set via wrangler secret

[site]
bucket = "./public"
